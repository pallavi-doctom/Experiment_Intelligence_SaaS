server:
  port: 8082

spring:
  application:
    name: experiment-service
  datasource:
    url: jdbc:mysql://localhost:3310/experiment_db
    username: experiment_user
    password: experiment_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: VARCHAR
          preferred_enum_jdbc_type: VARCHAR
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-minimum-256-bits}
  expiration: 86400000
