server:
  port: 8081

spring:
  application:
    name: auth-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:mysql://localhost:3309/auth_db
    username: auth_user
    password: auth_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: VARCHAR
          preferred_enum_jdbc_type: VARCHAR
